name: Build Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_KEYSTORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nono-release.jks"

      - name: Build APK
        env:
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/nono-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Read app version
        id: app_version
        run: |
          VERSION_NAME=$(grep '^versionName=' version.properties | cut -d= -f2)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/Nono-v${{ steps.app_version.outputs.version_name }}-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nono-v${{ steps.app_version.outputs.version_name }}-release-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nono v${{ steps.app_version.outputs.version_name }}
          files: release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
